<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html2figma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 280px;
            background: #1e1e2e;
            color: #cdd6f4;
        }

        .header {
            background: #313244;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #45475a;
        }

        .logo {
            width: 28px;
            height: 28px;
            background: #7c3aed;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #cdd6f4;
        }

        .header span {
            font-size: 10px;
            color: #6c7086;
            margin-left: auto;
        }

        .body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .url-box {
            background: #313244;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: #6c7086;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-capture {
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-capture:hover { background: #6d28d9; }
        .btn-capture:disabled { background: #45475a; cursor: not-allowed; }

        .status {
            font-size: 11px;
            text-align: center;
            min-height: 16px;
            color: #6c7086;
        }

        .status.success { color: #a6e3a1; }
        .status.error   { color: #f38ba8; }
        .status.loading { color: #fab387; }

        .divider {
            border: none;
            border-top: 1px solid #313244;
        }

        .footer {
            padding: 10px 16px;
            font-size: 10px;
            color: #45475a;
            text-align: center;
        }

        .footer a { color: #7c3aed; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">F</div>
        <h1>html2figma</h1>
        <span>v1.0.0</span>
    </div>

    <div class="body">
        <div class="url-box" id="currentUrl">Carregando...</div>

        <button class="btn-capture" id="btnCapture">
            <span>⬡</span> Capturar página
        </button>

        <div class="status" id="status">
            Clique para capturar a página atual
        </div>
    </div>

    <hr class="divider" />

    <div class="footer">
        Open source · MIT ·
        <a href="https://github.com/eltoncesar/html2figma-oss" target="_blank">GitHub</a>
    </div>

    <script src="dist/popup.bundle.js"></script>
</body>
</html>
