<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
            color: #333;
            background: #fff;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 240px;
        }

        h2 { font-size: 14px; font-weight: 600; }

        p { color: #666; line-height: 1.5; }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #e5e5e5;
        }

        .tab {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #7c3aed;
            border-bottom-color: #7c3aed;
        }

        .drop-zone {
            border: 2px dashed #d0d0d0;
            border-radius: 8px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            color: #888;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: #7c3aed;
            background: #f5f0ff;
            color: #7c3aed;
        }

        .drop-zone input { display: none; }

        .drop-icon { font-size: 28px; margin-bottom: 8px; }

        .hint {
            font-size: 10px;
            color: #aaa;
            text-align: center;
        }

        .btn {
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover { background: #6d28d9; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .status {
            font-size: 11px;
            color: #888;
            text-align: center;
            min-height: 14px;
        }

        .status.success { color: #22c55e; }
        .status.error   { color: #ef4444; }
        .status.loading { color: #f97316; }
    </style>
</head>
<body>
    <h2>html2figma</h2>

    <div class="tabs">
        <div class="tab active" id="tabPng" onclick="switchTab('png')">📷 Screenshot (PNG)</div>
        <div class="tab" id="tabJson" onclick="switchTab('json')">🔧 DOM (JSON)</div>
    </div>

    <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".png,.json" />
        <div class="drop-icon" id="dropIcon">🖼️</div>
        <div id="dropLabel">Arraste o arquivo PNG aqui<br /><small>ou clique para selecionar</small></div>
    </div>

    <div class="hint" id="hintText">Screenshot gerado pela extensão Chrome → importa como frame de imagem fiel ao site</div>

    <button class="btn" id="btnImport" disabled>Importar para o Figma</button>

    <div class="status" id="status">Aguardando arquivo...</div>

    <script>
        var dropZone  = document.getElementById('dropZone');
        var fileInput = document.getElementById('fileInput');
        var btnImport = document.getElementById('btnImport');
        var statusEl  = document.getElementById('status');
        var dropIcon  = document.getElementById('dropIcon');
        var dropLabel = document.getElementById('dropLabel');
        var hintText  = document.getElementById('hintText');

        var currentMode = 'png'; // 'png' ou 'json'
        var fileData    = null;
        var fileType    = null; // 'image' ou 'json'

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tabPng').className  = 'tab' + (mode === 'png'  ? ' active' : '');
            document.getElementById('tabJson').className = 'tab' + (mode === 'json' ? ' active' : '');

            if (mode === 'png') {
                fileInput.accept = '.png';
                dropIcon.textContent  = '🖼️';
                dropLabel.innerHTML   = 'Arraste o arquivo PNG aqui<br /><small>ou clique para selecionar</small>';
                hintText.textContent  = 'Screenshot gerado pela extensão Chrome → importa como frame de imagem fiel ao site';
            } else {
                fileInput.accept = '.json';
                dropIcon.textContent  = '📂';
                dropLabel.innerHTML   = 'Arraste o arquivo JSON aqui<br /><small>ou clique para selecionar</small>';
                hintText.textContent  = 'JSON gerado pela extensão → importa como nós editáveis (experimental)';
            }

            // Resetar estado
            fileData = null;
            fileType = null;
            btnImport.disabled = true;
            setStatus('Aguardando arquivo...');
        }

        // Clique na drop zone abre o seletor de arquivo
        dropZone.addEventListener('click', function() { fileInput.click(); });

        // Drag & drop visual
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', function() {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            var file = e.dataTransfer.files[0];
            if (file) readFile(file);
        });

        fileInput.addEventListener('change', function() {
            if (fileInput.files[0]) readFile(fileInput.files[0]);
        });

        function readFile(file) {
            var isPng  = file.name.toLowerCase().endsWith('.png') || file.type === 'image/png';
            var isJson = file.name.toLowerCase().endsWith('.json');

            if (!isPng && !isJson) {
                setStatus('Arquivo inválido. Use .png ou .json.', 'error');
                return;
            }

            if (isPng) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    fileData = e.target.result; // ArrayBuffer
                    fileType = 'image';
                    dropLabel.innerHTML = '✓ <strong>' + file.name + '</strong><br/><small>' + (file.size / 1024).toFixed(1) + ' KB</small>';
                    btnImport.disabled  = false;
                    setStatus('Screenshot carregado: ' + file.name, 'success');
                };
                reader.readAsArrayBuffer(file);
                return;
            }

            if (isJson) {
                var reader2 = new FileReader();
                reader2.onload = function(e) {
                    try {
                        fileData = JSON.parse(e.target.result);
                        fileType = 'json';
                        dropLabel.innerHTML = '✓ <strong>' + file.name + '</strong><br/><small>' + (file.size / 1024).toFixed(1) + ' KB</small>';
                        btnImport.disabled  = false;
                        setStatus('JSON carregado: ' + (fileData.meta ? fileData.meta.title : file.name), 'success');
                    } catch (err) {
                        setStatus('Erro ao ler o JSON.', 'error');
                    }
                };
                reader2.readAsText(file);
            }
        }

        btnImport.addEventListener('click', function() {
            if (!fileData) return;
            btnImport.disabled = true;
            setStatus('Importando para o Figma...', 'loading');

            if (fileType === 'image') {
                parent.postMessage({ pluginMessage: {
                    type:  'import_image',
                    bytes: fileData
                }}, '*');
            } else {
                parent.postMessage({ pluginMessage: {
                    type: 'import',
                    data: fileData
                }}, '*');
            }
        });

        // Resposta do code.js
        window.onmessage = function(event) {
            var msg = event.data.pluginMessage;
            if (!msg) return;

            if (msg.type === 'done') {
                setStatus('✓ Importado com sucesso!', 'success');
                btnImport.disabled = false;
            }
            if (msg.type === 'error') {
                setStatus('Erro: ' + msg.error, 'error');
                btnImport.disabled = false;
            }
        };

        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className   = 'status' + (type ? ' ' + type : '');
        }
    </script>
</body>
</html>
